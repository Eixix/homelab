name: Deploy Homelab

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Space-separated Compose services, 'all' for the complete stack, or empty to stage only"
        required: false
        default: ""
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SSH_HOST }}
      DEPLOY_USER: github
      DEPLOY_PATH: /home/github/homelab
      DEPLOY_SERVICES: ${{ inputs.services }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install and connect WireGuard
        env:
          WIREGUARD_CONF: ${{ secrets.WIREGUARD_CONF }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wireguard-tools
          sudo ln -sf "$(command -v resolvectl)" /usr/local/bin/resolvconf
          umask 077
          printf '%s' "$WIREGUARD_CONF" > "$RUNNER_TEMP/wg0.conf"
          sudo wg-quick up "$RUNNER_TEMP/wg0.conf"

      - name: Configure SSH
        env:
          DEPLOY_SECRET_KEY: ${{ secrets.DEPLOY_SECRET_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          umask 077
          printf '%s\n' "$DEPLOY_SECRET_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Prepare deployment directory
        run: |
          set -euo pipefail
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "install -d -m 700 '$DEPLOY_PATH/secrets'; install -d '$DEPLOY_PATH/data' '$DEPLOY_PATH/backups' '$DEPLOY_PATH/data/monitoring' '$DEPLOY_PATH/data/monitoring/grafana' '$DEPLOY_PATH/data/monitoring/loki' '$DEPLOY_PATH/data/monitoring/alloy' '$DEPLOY_PATH/data/traefik' '$DEPLOY_PATH/data/traefik/logs'"

      - name: Synchronize repository
        run: |
          set -euo pipefail
          rsync -az --delete --delete-delay \
            --exclude='/.env' \
            --exclude='/data/' \
            --exclude='/secrets/' \
            --exclude='/backups/' \
            --exclude='/docs/.docusaurus/' \
            --exclude='/docs/build/' \
            --exclude='/docs/node_modules/' \
            --exclude='/.git/' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Write production configuration
        env:
          DEPLOY_ENV_FILE: ${{ secrets.ENV_FILE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$DEPLOY_ENV_FILE" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "umask 077; cat > '$DEPLOY_PATH/.env'"
          printf '%s' "$CLOUDFLARE_API_TOKEN" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "umask 077; cat > '$DEPLOY_PATH/secrets/cloudflare_api_token'"

      - name: Validate and optionally deploy services
        run: |
          set -euo pipefail
          DEPLOY_SERVICES_B64="$(printf '%s' "$DEPLOY_SERVICES" | base64 -w 0)"
          deployment_log="$RUNNER_TEMP/homelab-deploy.log"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_SERVICES_B64=$DEPLOY_SERVICES_B64 bash -s" <<'REMOTE' | tee "$deployment_log"
            set -e
            cd /home/github/homelab
            before_containers="$(mktemp)"
            after_containers="$(mktemp)"
            trap 'rm -f "$before_containers" "$after_containers"' EXIT
            docker ps -a --filter label=com.docker.compose.project=homelab --format '{{.Names}}={{.ID}}' | sort > "$before_containers"
            DEPLOY_SERVICES="$(printf '%s' "$DEPLOY_SERVICES_B64" | base64 --decode)"
            case "$DEPLOY_SERVICES" in
              *[!a-zA-Z0-9_.\ -]*)
                echo 'Service selection contains unsupported characters.' >&2
                exit 1
                ;;
            esac
            DEPLOY_ALL=false
            if [ "$DEPLOY_SERVICES" = "all" ]; then
              DEPLOY_ALL=true
            elif case " $DEPLOY_SERVICES " in *" all "*) true;; *) false;; esac; then
              echo "The 'all' alias must be used on its own." >&2
              exit 1
            fi
            selected() {
              [ "$DEPLOY_ALL" = true ] || case " $DEPLOY_SERVICES " in
                *" $1 "*) return 0 ;;
                *) return 1 ;;
              esac
            }
            test -s .env
            test -s secrets/cloudflare_api_token
            required_env="
            TZ
            DOMAIN_EXTERNAL
            DOMAIN_INTERNAL
            TRAEFIK_HOST
            HOMEPAGE_LEGACY_HOST
            HOMEPAGE_HOST
            DOCS_HOST
            ADGUARD_HOST
            STEP_CA_HOST
            TRAEFIK_EXTERNAL_CERTIFICATE_CONFIG_PATH
            VAULTWARDEN_HOST
            SHLINK_HOST
            SHLINK_WEB_HOST
            ACTUAL_HOST
            N8N_HOST
            GO2RTC_HOST
            KITCHENOWL_HOST
            PAPERLESS_HOST
            HOMEASSISTANT_HOST
            HOMEASSISTANT_EXTERNAL_HOST
            KAVITA_HOST
            IMMICH_HOST
            IMMICH_ADDITIONAL_EXTERNAL_HOST
            IMMICH_INTERNAL_HOST
            BESZEL_HOST
            GRAFANA_HOST
            GRAFANA_ADMIN_USER
            GRAFANA_ADMIN_PASSWORD
            LAN_CIDR
            DEPLOY_UID
            DEPLOY_GID
            ADGUARD_DNS_BIND_IP
            ADGUARD_WEB_PORT
            TRAEFIK_ACME_EMAIL
            "
            missing_env=""
            for key in $required_env; do
              if ! grep -Eq "^${key}=" .env; then
                missing_env="$missing_env $key"
              fi
            done
            if [ -n "$missing_env" ]; then
              echo "ENV_FILE is incomplete; missing required keys:$missing_env" >&2
              exit 1
            fi
            if selected zahldeineschuldenan; then
              for key in ZAHLDEINESCHULDENAN_HOST PAYMENT_RECIPIENT_NAME PAYMENT_IBAN PAYMENT_BIC PAYPAL_ME_NAME; do
                if ! grep -Eq "^${key}=.+" .env; then
                  echo "ENV_FILE is incomplete; missing required payment-page key: $key" >&2
                  exit 1
                fi
              done
            fi
            if selected paperless-broker || selected paperless-db || selected paperless-web; then
              for key in PAPERLESS_DB_PASSWORD PAPERLESS_DB_ROOT_PASSWORD PAPERLESS_SECRET_KEY PAPERLESS_ADMIN_PASSWORD; do
                if ! grep -Eq "^${key}=" .env; then
                  echo "ENV_FILE is incomplete; missing required Paperless key: $key" >&2
                  exit 1
                fi
              done
              if grep -Eq '^PAPERLESS_DB_PASSWORD=change-me$|^PAPERLESS_DB_ROOT_PASSWORD=change-me-root$|^PAPERLESS_SECRET_KEY=change-me-long-random-secret$|^PAPERLESS_ADMIN_PASSWORD=change-me$' .env; then
                echo "ENV_FILE contains placeholder Paperless secrets; refusing to deploy Paperless." >&2
                exit 1
              fi
            fi
            if [ "$DEPLOY_ALL" = true ]; then
              for key in BESZEL_AGENT_KEY BESZEL_AGENT_TOKEN BESZEL_EXTRA_FILESYSTEM_PATH; do
                if ! grep -Eq "^${key}=.+" .env; then
                  echo "ENV_FILE is incomplete; missing required all-deploy key: $key" >&2
                  exit 1
                fi
              done
              if grep -Eq '^BESZEL_AGENT_KEY=dummy-|^BESZEL_AGENT_TOKEN=dummy-' .env; then
                echo "ENV_FILE contains placeholder Beszel agent credentials; refusing an all deployment." >&2
                exit 1
              fi
            fi
            docker network inspect external_network >/dev/null 2>&1 || docker network create external_network
            docker network inspect internal_network >/dev/null 2>&1 || docker network create internal_network
            if [ "$DEPLOY_ALL" = true ]; then
              docker compose --env-file .env --profile "*" config --quiet
              docker compose --env-file .env --profile "*" pull
              docker compose --env-file .env --profile "*" build --pull
              docker compose --env-file .env --profile "*" up -d --remove-orphans
            elif [ -n "$DEPLOY_SERVICES" ]; then
              docker compose --env-file .env --profile external config --quiet
              read -r -a services <<< "$DEPLOY_SERVICES"
              docker compose --env-file .env --profile external pull "${services[@]}"
              docker compose --env-file .env --profile external build --pull "${services[@]}"
              docker compose --env-file .env --profile external up -d "${services[@]}"
            else
              docker compose --env-file .env --profile external config --quiet
              echo 'Repository synchronized and configuration validated; no services selected for startup.'
            fi
            docker ps -a --filter label=com.docker.compose.project=homelab --format '{{.Names}}={{.ID}}' | sort > "$after_containers"
            echo 'UPDATED_CONTAINERS_BEGIN'
            updated=false
            while IFS='=' read -r name id; do
              if ! grep -Fqx "$name=$id" "$before_containers"; then
                printf '%s\n' "$name"
                updated=true
              fi
            done < "$after_containers"
            if [ "$updated" = false ]; then
              echo '(none)'
            fi
            echo 'UPDATED_CONTAINERS_END'
          REMOTE
          {
            echo '### Containers actually updated'
            sed -n '/^UPDATED_CONTAINERS_BEGIN$/,/^UPDATED_CONTAINERS_END$/p' "$deployment_log" | sed '1d;$d;s/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Disconnect WireGuard
        if: always()
        run: |
          if [[ -f "$RUNNER_TEMP/wg0.conf" ]]; then
            sudo wg-quick down "$RUNNER_TEMP/wg0.conf" || true
          fi
