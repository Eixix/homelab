name: Deploy Homelab

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Space-separated Compose services to start after synchronization; leave empty to stage only"
        required: false
        default: ""
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SSH_HOST }}
      DEPLOY_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: /home/github/homelab
      DEPLOY_SERVICES: ${{ inputs.services }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install and connect WireGuard
        env:
          WIREGUARD_CONF: ${{ secrets.WIREGUARD_CONF }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wireguard-tools
          sudo ln -sf "$(command -v resolvectl)" /usr/local/bin/resolvconf
          umask 077
          printf '%s' "$WIREGUARD_CONF" > "$RUNNER_TEMP/wg0.conf"
          sudo wg-quick up "$RUNNER_TEMP/wg0.conf"

      - name: Configure SSH
        env:
          DEPLOY_SECRET_KEY: ${{ secrets.DEPLOY_SECRET_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          umask 077
          printf '%s' "$DEPLOY_SECRET_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Prepare deployment directory
        run: |
          set -euo pipefail
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "install -d -m 700 '$DEPLOY_PATH/secrets'; install -d '$DEPLOY_PATH/data' '$DEPLOY_PATH/backups'"

      - name: Synchronize repository
        run: |
          set -euo pipefail
          rsync -az --delete --delete-delay \
            --exclude='/.env' \
            --exclude='/data/' \
            --exclude='/secrets/' \
            --exclude='/backups/' \
            --exclude='/.git/' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Write production configuration
        env:
          DEPLOY_ENV_FILE: ${{ secrets.ENV_FILE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$DEPLOY_ENV_FILE" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "umask 077; cat > '$DEPLOY_PATH/.env'"
          printf '%s' "$CLOUDFLARE_API_TOKEN" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "umask 077; cat > '$DEPLOY_PATH/secrets/cloudflare_api_token'"

      - name: Validate and optionally start selected services
        run: |
          set -euo pipefail
          DEPLOY_SERVICES_B64="$(printf '%s' "$DEPLOY_SERVICES" | base64 -w 0)"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_SERVICES_B64=$DEPLOY_SERVICES_B64 bash -s" <<'REMOTE'
            set -e
            cd /home/github/homelab
            DEPLOY_SERVICES="$(printf '%s' "$DEPLOY_SERVICES_B64" | base64 --decode)"
            case "$DEPLOY_SERVICES" in
              *[!a-zA-Z0-9_.\ -]*)
                echo 'Service selection contains unsupported characters.' >&2
                exit 1
                ;;
            esac
            test -s .env
            test -s secrets/cloudflare_api_token
            docker network inspect external_network >/dev/null 2>&1 || docker network create external_network
            docker network inspect internal_network >/dev/null 2>&1 || docker network create internal_network
            docker compose --env-file .env --profile external config --quiet
            if [ -n "$DEPLOY_SERVICES" ]; then
              read -r -a services <<< "$DEPLOY_SERVICES"
              docker compose --env-file .env --profile external pull "${services[@]}"
              docker compose --env-file .env --profile external up -d "${services[@]}"
            else
              echo 'Repository synchronized and configuration validated; no services selected for startup.'
            fi
          REMOTE

      - name: Disconnect WireGuard
        if: always()
        run: |
          if [[ -f "$RUNNER_TEMP/wg0.conf" ]]; then
            sudo wg-quick down "$RUNNER_TEMP/wg0.conf" || true
          fi
