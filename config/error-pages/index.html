<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Service unavailable</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f5f1;
      --fg: #202124;
      --muted: #62655f;
      --line: #d9d5cc;
      --accent: #2d6cdf;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161819;
        --fg: #f2f0ea;
        --muted: #adb0aa;
        --line: #3a3e40;
        --accent: #8ab4ff;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--bg);
      color: var(--fg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 560px);
      border-top: 1px solid var(--line);
      padding-top: 28px;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
      font-size: 1rem;
    }

    .eyebrow {
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--fg);
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 1;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Homelab</p>
    <h1>This service did not answer.</h1>
    <p>The route exists, but the upstream app returned an error or is temporarily offline. Try again in a moment.</p>
  </main>
</body>
</html>
