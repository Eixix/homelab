<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#07120f">
  <title>Service unavailable</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap");

    :root {
      color-scheme: dark;
      --bg: #07120f;
      --panel: #0d1d18;
      --text: #edf6ef;
      --muted: #8ea49a;
      --lime: #cfff46;
      --line: rgba(207, 255, 70, 0.25);
      font-family: Manrope, ui-sans-serif, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      overflow-x: hidden;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    main {
      width: min(560px, 100%);
      padding: clamp(28px, 7vw, 52px);
      position: relative;
      text-align: center;
      background: rgba(13, 29, 24, 0.96);
      border: 1px solid var(--line);
      border-top-color: rgba(207, 255, 70, 0.65);
      border-radius: 7px;
      box-shadow: 0 35px 90px rgba(0, 0, 0, 0.5);
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
      font-size: 1rem;
    }

    .eyebrow {
      margin-bottom: 12px;
      color: var(--lime);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      color: var(--text);
      font-size: clamp(2.2rem, 9vw, 4.4rem);
      line-height: 0.92;
      letter-spacing: -0.065em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      padding: 11px 16px;
      color: var(--lime);
      background: rgba(207, 255, 70, 0.06);
      border: 1px solid var(--line);
      border-radius: 4px;
      font-family: "DM Mono", ui-monospace, monospace;
      font-weight: 750;
      font-size: 0.86rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--lime);
      box-shadow: 0 0 0 5px rgba(207,255,70,.08), 0 0 16px var(--lime);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Homelab</p>
    <h1>This service did not answer.</h1>
    <p>The route exists, but the upstream app returned an error or is temporarily offline. Try again in a moment.</p>
    <div class="status"><span class="dot" aria-hidden="true"></span><span>Internal route protected by Traefik</span></div>
  </main>
</body>
</html>
