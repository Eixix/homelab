<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Service unavailable</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: #11141c;
      --fg: #f4f0ff;
      --muted: #a7a2b8;
      --line: #2a2638;
      --accent: #c7a6ff;
      --accent-strong: #8bd6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at 50% -20%, rgba(139, 214, 255, 0.14), transparent 34rem),
        linear-gradient(180deg, #0e1018 0%, var(--bg) 58%);
      color: var(--fg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: 34px 0 0;
      border-top: 1px solid var(--line);
      position: relative;
    }

    main::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 0;
      width: 112px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
      font-size: 1rem;
    }

    .eyebrow {
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      color: var(--fg);
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid rgba(199, 166, 255, 0.18);
      color: var(--muted);
      font-size: 0.86rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-strong);
      box-shadow: 0 0 18px rgba(139, 214, 255, 0.9);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Homelab</p>
    <h1>This service did not answer.</h1>
    <p>The route exists, but the upstream app returned an error or is temporarily offline. Try again in a moment.</p>
    <div class="status"><span class="dot" aria-hidden="true"></span><span>Internal route protected by Traefik</span></div>
  </main>
</body>
</html>
