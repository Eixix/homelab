<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#12372a">
  <title>Service unavailable</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #102a21;
      --green: #0d7044;
      --green-dark: #173e2e;
      --cream: #fffef5;
      --yellow: #f4d35e;
      font-family: Inter, ui-rounded, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      overflow-x: hidden;
      color: var(--ink);
      background: radial-gradient(circle at top, #f9e784 0, #f3bc42 34%, #0e5a3b 100%);
    }

    main {
      width: min(560px, 100%);
      padding: clamp(28px, 7vw, 52px);
      position: relative;
      text-align: center;
      background: rgba(255, 255, 245, 0.94);
      border: 3px solid var(--green-dark);
      border-radius: 28px;
      box-shadow: 10px 12px 0 var(--green-dark), 0 28px 70px rgba(0, 0, 0, 0.3);
      transform: rotate(-0.5deg);
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: #52645c;
      font-size: 1rem;
    }

    .eyebrow {
      margin-bottom: 12px;
      color: #a24315;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      color: var(--ink);
      font-size: clamp(2.2rem, 9vw, 4.4rem);
      line-height: 0.92;
      letter-spacing: -0.065em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      padding: 11px 16px;
      color: var(--ink);
      background: #f4f8df;
      border: 2px dashed var(--green);
      border-radius: 999px;
      font-weight: 750;
      font-size: 0.86rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 2px 2px 0 var(--yellow);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Homelab</p>
    <h1>This service did not answer.</h1>
    <p>The route exists, but the upstream app returned an error or is temporarily offline. Try again in a moment.</p>
    <div class="status"><span class="dot" aria-hidden="true"></span><span>Internal route protected by Traefik</span></div>
  </main>
</body>
</html>
