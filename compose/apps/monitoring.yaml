services:
  monitoring-permissions:
    container_name: monitoring-permissions
    image: alpine:3.23.3
    user: "0:0"
    restart: "no"
    command:
      - sh
      - -ec
      - chown -R ${DEPLOY_UID}:${DEPLOY_GID} /state/alloy /state/grafana /state/loki
    volumes:
      - ../../data/monitoring/alloy:/state/alloy
      - ../../data/monitoring/grafana:/state/grafana
      - ../../data/monitoring/loki:/state/loki

  loki:
    container_name: loki
    image: grafana/loki:3.7.3
    restart: unless-stopped
    user: ${DEPLOY_UID}:${DEPLOY_GID}
    depends_on:
      monitoring-permissions:
        condition: service_completed_successfully
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ../../config/monitoring/loki.yaml:/etc/loki/config.yaml:ro
      - ../../data/monitoring/loki:/loki
    networks:
      - internal_network

  alloy:
    container_name: alloy
    image: grafana/alloy:v1.17.1
    restart: unless-stopped
    user: ${DEPLOY_UID}:${DEPLOY_GID}
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      monitoring-permissions:
        condition: service_completed_successfully
      loki:
        condition: service_started
    volumes:
      - ../../config/monitoring/alloy.alloy:/etc/alloy/config.alloy:ro
      - ../../data/monitoring/alloy:/var/lib/alloy/data
      - ../../data/traefik/logs:/var/log/traefik:ro
    networks:
      - internal_network

  grafana:
    container_name: grafana
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    user: ${DEPLOY_UID}:${DEPLOY_GID}
    depends_on:
      monitoring-permissions:
        condition: service_completed_successfully
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ../../data/monitoring/grafana:/var/lib/grafana
      - ../../config/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../config/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - internal_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=internalresolver
      - traefik.http.routers.grafana.middlewares=internal-app@file
      - traefik.http.services.grafana.loadbalancer.server.port=3000
      - traefik.docker.network=internal_network

  beszel:
    container_name: beszel
    image: henrygd/beszel:latest
    restart: unless-stopped
    volumes:
      - ../../data/monitoring/beszel/data:/beszel_data
      - ../../data/monitoring/beszel/socket:/beszel_socket
    networks:
      - internal_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.beszel.rule=Host(`${BESZEL_HOST}`)
      - traefik.http.routers.beszel.entrypoints=websecure
      - traefik.http.routers.beszel.tls=true
      - traefik.http.routers.beszel.tls.certresolver=internalresolver
      - traefik.http.routers.beszel.middlewares=internal-app@file
      - traefik.http.services.beszel.loadbalancer.server.port=8090
      - traefik.docker.network=internal_network

  beszel-agent:
    container_name: beszel-agent
    image: henrygd/beszel-agent:latest
    profiles:
      - agent
    restart: unless-stopped
    network_mode: host
    environment:
      LISTEN: 45876
      KEY: ${BESZEL_AGENT_KEY}
      TOKEN: ${BESZEL_AGENT_TOKEN}
      HUB_URL: https://${BESZEL_HOST}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../data/monitoring/beszel-agent:/var/lib/beszel-agent
      - ${BESZEL_EXTRA_FILESYSTEM_PATH}:/extra-filesystems/zfs-pool:ro
