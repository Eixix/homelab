services:
  kitchenowl-front:
    container_name: kitchenowlfront
    image: tombursch/kitchenowl-web:latest
    restart: unless-stopped
    depends_on:
      - kitchenowl-back
    environment:
      TZ: ${TZ}
    networks:
      - external_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.kitchenowl.rule=Host(`${KITCHENOWL_HOST}`)
      - traefik.http.routers.kitchenowl.entrypoints=websecure
      - traefik.http.routers.kitchenowl.priority=100
      - traefik.http.routers.kitchenowl.tls=true
      - traefik.http.routers.kitchenowl.tls.certresolver=externalresolver
      - traefik.http.routers.kitchenowl.middlewares=security-headers@file
      - traefik.http.services.kitchenowl.loadbalancer.server.port=80
      - traefik.docker.network=external_network

  kitchenowl-back:
    container_name: kitchenowlback
    image: tombursch/kitchenowl-backend:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    volumes:
      - ../../data/kitchenowl:/data
    networks:
      external_network:
        aliases:
          - back
