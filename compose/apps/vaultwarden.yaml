services:
  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:latest
    restart: unless-stopped
    user: ${VAULTWARDEN_UID}:${VAULTWARDEN_GID}
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ}
      DOMAIN: https://${VAULTWARDEN_HOST}
      SIGNUPS_ALLOWED: "false"
      SMTP_HOST: ${SMTP_SERVER}
      SMTP_FROM: vaultwarden@${DOMAIN_EXTERNAL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Vaultwarden}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURITY: ${SMTP_SECURITY:-starttls}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_KEY}
    volumes:
      - ../../data/vaultwarden:/data
    networks:
      - external_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.vaultwarden.rule=Host(`${VAULTWARDEN_HOST}`)
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.priority=100
      - traefik.http.routers.vaultwarden.tls=true
      - traefik.http.routers.vaultwarden.tls.certresolver=externalresolver
      - traefik.http.routers.vaultwarden.middlewares=vaultwarden-security-headers@file
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
      - traefik.docker.network=external_network
