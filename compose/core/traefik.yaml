services:
  reverse-proxy:
    container_name: traefik
    image: traefik:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      CF_DNS_API_TOKEN_FILE: /run/secrets/cloudflare_api_token
    depends_on:
      step-ca:
        condition: service_healthy
    command:
      - --accesslog=true
      - --accesslog.format=json
      - --accesslog.filepath=/var/log/traefik/access.json
      - --accesslog.fields.queryparameters.defaultmode=drop
      - --accesslog.fields.headers.defaultmode=drop
      - --accesslog.fields.headers.names.User-Agent=keep
      - --accesslog.fields.headers.names.Referer=keep
      - --accesslog.fields.headers.names.X-Request-ID=keep
      - --accesslog.fields.headers.names.CF-IPCountry=keep
      - --accesslog.fields.headers.names.CF-Ray=keep
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.forwardedheaders.trustedips=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.forwardedheaders.trustedips=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.http.middlewares=global-noindex@file
      - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=0s
      - --entryPoints.name.transport.respondingTimeouts.idleTimeout=600
      - --entryPoints.name.transport.respondingTimeouts.readTimeout=600
      - --certificatesresolvers.internalresolver.acme.tlschallenge=true
      - --certificatesresolvers.internalresolver.acme.caServer=https://${STEP_CA_HOST}:9000/acme/acme/directory
      - --certificatesresolvers.internalresolver.acme.certificatesDuration=24
      - --certificatesresolvers.internalresolver.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.internalresolver.acme.storage=/letsencrypt/internal-acme.json
      - --certificatesresolvers.externalresolver.acme.dnschallenge=true
      - --certificatesresolvers.externalresolver.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.externalresolver.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.externalresolver.acme.storage=/letsencrypt/external-acme.json
    secrets:
      - cloudflare_api_token
    ports:
      - 80:80
      - 443:443
      # Dashboard deliberately not exposed on :8080 anymore.
    volumes:
      - ../../config/traefik/dynamic:/etc/traefik/dynamic
      - ${TRAEFIK_EXTERNAL_CERTIFICATE_CONFIG_PATH}:/etc/traefik/dynamic/99-external-certificate.yaml:ro
      - ../../data/step-ca/certs/root_ca.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - ../../data/traefik/letsencrypt:/letsencrypt
      - ../../data/traefik/certificates:/certificates:ro
      - ../../data/traefik/logs:/var/log/traefik
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      external_network:
      internal_network:
        aliases:
          - ${TRAEFIK_HOST}
          - ${HOMEPAGE_LEGACY_HOST}
          - ${HOMEPAGE_HOST}
          - ${DOCS_HOST}
          - ${ADGUARD_HOST}
          - ${VAULTWARDEN_HOST}
          - ${SHLINK_HOST}
          - ${SHLINK_WEB_HOST}
          - ${ACTUAL_HOST}
          - ${N8N_HOST}
          - ${GO2RTC_HOST}
          - ${KITCHENOWL_HOST}
          - ${PAPERLESS_HOST}
          - ${HOMEASSISTANT_HOST}
          - ${HOMEASSISTANT_EXTERNAL_HOST}
          - ${KAVITA_HOST}
          - ${IMMICH_HOST}
          - ${IMMICH_ADDITIONAL_EXTERNAL_HOST}
          - ${IMMICH_INTERNAL_HOST}
          - ${BESZEL_HOST}
          - ${GRAFANA_HOST}
          - ${EVCC_HOST}
          - ${ZAHLDEINESCHULDENAN_HOST}
    extra_hosts:
      - host.docker.internal:172.17.0.1
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.tls.certresolver=internalresolver
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=internal-app@file
      - traefik.docker.network=internal_network
