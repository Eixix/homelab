services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:1
    container_name: cloudflare-ddns
    profiles: [external]
    restart: unless-stopped
    user: ${DEPLOY_UID}:${DEPLOY_GID}
    network_mode: host
    read_only: true
    cap_drop: [all]
    security_opt:
      - no-new-privileges:true
    secrets:
      - cloudflare_api_token
    environment:
      # IPv6 origin routing is currently unreliable from Cloudflare to the homelab.
      # Keep public DNS IPv4-only until router/firewall IPv6 forwarding is verified.
      IP6_PROVIDER: static.empty
      CF_API_TOKEN_FILE: /run/secrets/cloudflare_api_token
      DOMAINS: ${CLOUDFLARE_DDNS_DOMAINS}
      PROXIED: ${CLOUDFLARE_DDNS_PROXIED}
