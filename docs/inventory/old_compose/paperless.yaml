services:
  paperless-broker:
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - /docker-compose-services/paperless-redis:/data
    networks:
      - internal_network

  paperless-db:
    image: docker.io/library/mariadb:10
    restart: unless-stopped
    volumes:
      - /docker-compose-services/paperless-db:/var/lib/mysql
    environment:
      MARIADB_HOST: paperless
      MARIADB_DATABASE: paperless
      MARIADB_USER: paperless
      MARIADB_PASSWORD: REDACTED_ROTATE_BEFORE_USE
      MARIADB_ROOT_PASSWORD: REDACTED_ROTATE_BEFORE_USE
    networks:
      - internal_network

  paperless-web:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-broker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - /docker-compose-services/paperless-data:/usr/src/paperless/data
      - /docker-compose-services/paperless-media:/usr/src/paperless/media
      - /docker-compose-services/paperless-export:/usr/src/paperless/export
      - /storage_array/documents:/usr/src/paperless/consume
    env_file: stack.env
    environment:
      PAPERLESS_URL: https://dokumente.home
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_DBENGINE: mariadb
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBUSER: paperless # only needed if non-default username
      PAPERLESS_DBPASS: paperless # only needed if non-default password
      PAPERLESS_DBPORT: 3306
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: REDACTED_ROTATE_BEFORE_USE
      PAPERLESS_OUTLOOK_OAUTH_CLIENT_ID: REDACTED_ROTATE_BEFORE_USE
      PAPERLESS_OUTLOOK_OAUTH_CLIENT_SECRET: REDACTED_ROTATE_BEFORE_USE
    networks:
      - internal_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperless.rule=Host(`dokumente.home`)"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"
      - "traefik.http.routers.paperless.entrypoints=websecure"
      - "traefik.http.routers.paperless.tls.certresolver=internalresolver"
      - "traefik.http.routers.paperless.tls=true"
      - "traefik.http.middlewares.test-ipwhitelist.ipwhitelist.sourcerange=10.0.0.0/8"
      - "traefik.docker.network=internal_network"

networks:
  internal_network:
    external: true
    name: internal_network
